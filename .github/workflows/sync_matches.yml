name: sync-matches
# Frequent match + goal-timeline sync. Pings the Render-hosted internal endpoint,
# which fetches Football-Data fixtures, enriches live + newly-finished matches with
# the goal scorers/minutes, and upserts everything into the `matches` MongoDB
# collection. All secrets (Football-Data token, Mongo URI) live on Render — this
# job only holds RENDER_BASE_URL + INTERNAL_TOKEN, same as the other crons.
on:
  schedule:
    # Every 5 minutes so live scores + goal events stay fresh for the 30s frontend poll.
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  sync-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Sync matches + goal events
        run: |
          # --max-time 120: Render free tier may cold-start, then the endpoint makes
          # a few Football-Data calls (fixtures + per-match goal detail) before replying.
          curl -fsS --max-time 120 \
            -X POST \
            -H "X-Internal-Token: ${{ secrets.INTERNAL_TOKEN }}" \
            "${{ secrets.RENDER_BASE_URL }}/internal/sync-matches"
