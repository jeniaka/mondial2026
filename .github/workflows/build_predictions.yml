name: Build Predictions

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build match predictions
        run: |
          curl -fsS --max-time 120 \
            -X POST \
            -H "X-Internal-Token: ${{ secrets.INTERNAL_TOKEN }}" \
            "${{ secrets.RENDER_BASE_URL }}/internal/build-predictions"
