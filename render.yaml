services:
  - type: web
    name: mondial2026
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: mondial2026
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        value: https://mondial2026.onrender.com/auth/google/callback
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: noreply@mytasks.bar
      - key: BREVO_SENDER_NAME
        value: Mondial 2026
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: APP_BASE_URL
        value: https://mondial2026.onrender.com
      - key: INTERNAL_TOKEN
        sync: false
      - key: TZ
        value: Asia/Jerusalem
