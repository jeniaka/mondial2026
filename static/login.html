<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>מונדיאל 2026 — התחברות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/rtl.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A8754">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mn-grass-light);
      padding: 24px;
    }
    .login-card {
      background: var(--mn-paper);
      border-radius: var(--mn-r-lg);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--mn-shadow-lg);
      text-align: center;
    }
    .login-logo {
      font-size: var(--mn-fs-xxl);
      font-weight: 800;
      color: var(--mn-pitch-green);
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .login-tagline {
      font-size: var(--mn-fs-md);
      color: var(--mn-ink-soft);
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: var(--mn-fs-sm);
      color: var(--mn-ink-soft);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .login-google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: var(--mn-pitch-green);
      color: #fff;
      border-radius: var(--mn-r-pill);
      font-size: var(--mn-fs-md);
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: background 120ms, transform 120ms;
      text-decoration: none;
    }
    .login-google-btn:hover { background: var(--mn-pitch-deep); }
    .login-google-btn:active { transform: scale(0.97); }
    .login-google-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .login-error {
      margin-top: 16px;
      padding: 10px 16px;
      background: rgba(139, 30, 30, 0.1);
      border-radius: var(--mn-r-sm);
      color: var(--mn-red);
      font-size: var(--mn-fs-sm);
    }
    .lang-toggle {
      position: fixed;
      top: 16px;
      inset-inline-end: 16px;
      font-size: var(--mn-fs-xs);
      font-weight: 700;
      padding: 5px 12px;
      border: 1.5px solid var(--mn-line);
      border-radius: var(--mn-r-pill);
      color: var(--mn-ink-soft);
      background: var(--mn-paper);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="lang-toggle" id="lang-toggle">EN</button>

  <div class="login-card">
    <div class="login-logo" id="app-title">מונדיאל 2026</div>
    <div class="login-tagline" id="app-tagline">המונדיאל בכיס שלך</div>
    <div class="login-subtitle" id="app-subtitle">עקוב אחרי המשחקים, נחש תוצאות עם החברים, וזכה בכבוד הגדול</div>

    <a href="/auth/google/start" class="login-google-btn" id="sign-in-btn">
      <svg class="login-google-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span id="sign-in-text">התחברות עם חשבון Google</span>
    </a>

    <div id="error-msg" style="display:none;" class="login-error"></div>
  </div>

  <script>
    // Minimal i18n for login page (no ES modules needed here)
    const strings = {
      he: {
        title: 'מונדיאל 2026',
        tagline: 'המונדיאל בכיס שלך',
        subtitle: 'עקוב אחרי המשחקים, נחש תוצאות עם החברים, וזכה בכבוד הגדול',
        signIn: 'התחברות עם חשבון Google',
        toggle: 'EN',
      },
      en: {
        title: 'Mondial 2026',
        tagline: 'The World Cup in your pocket',
        subtitle: 'Follow every match, predict scores with friends, and chase the bragging rights.',
        signIn: 'Sign in with Google',
        toggle: 'עב',
      }
    };

    let lang = localStorage.getItem('lang') || 'he';

    function applyLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      const s = strings[l];
      document.documentElement.setAttribute('lang', l);
      document.documentElement.setAttribute('dir', l === 'he' ? 'rtl' : 'ltr');
      document.getElementById('app-title').textContent    = s.title;
      document.getElementById('app-tagline').textContent  = s.tagline;
      document.getElementById('app-subtitle').textContent = s.subtitle;
      document.getElementById('sign-in-text').textContent = s.signIn;
      document.getElementById('lang-toggle').textContent  = s.toggle;
    }

    applyLang(lang);

    document.getElementById('lang-toggle').addEventListener('click', () => {
      applyLang(lang === 'he' ? 'en' : 'he');
    });

    // Show error if redirected with ?error=
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'block';
      const msgs = {
        oauth_denied:    lang === 'he' ? 'ההתחברות בוטלה' : 'Sign-in was cancelled',
        state_mismatch:  lang === 'he' ? 'שגיאת אבטחה. נסה שוב.' : 'Security error. Try again.',
        oauth_error:     lang === 'he' ? 'שגיאת התחברות. נסה שוב.' : 'Sign-in error. Try again.',
      };
      errEl.textContent = msgs[err] || (lang === 'he' ? 'אירעה שגיאה' : 'An error occurred');
    }
  </script>
</body>
</html>
